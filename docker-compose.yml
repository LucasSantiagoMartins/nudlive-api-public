services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nudlive-nginx
    restart: unless-stopped
    ports:
      - '7070:80'
    depends_on:
      - core-service
      - media-live-service
      - real-time-service
    networks:
      - nudlive-network

  core-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nudlive-core
    command: npm run start:core:dev
    restart: unless-stopped
    expose:
      - '3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      TZ: Africa/Luanda
      NODE_OPTIONS: --max-old-space-size=512
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - .:/app
      - /app/node_modules
    mem_limit: 1g
    networks:
      - nudlive-network

  media-live-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nudlive-media-live
    command: npm run start:media:dev
    restart: unless-stopped
    expose:
      - '3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      TZ: Africa/Luanda
      NODE_OPTIONS: --max-old-space-size=512
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - .:/app
      - /app/node_modules
    mem_limit: 1g
    networks:
      - nudlive-network

  real-time-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nudlive-real-time
    command: npm run start:realtime:dev
    restart: unless-stopped
    expose:
      - '3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      TZ: Africa/Luanda
      NODE_OPTIONS: --max-old-space-size=512
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - .:/app
      - /app/node_modules
    mem_limit: 1g
    networks:
      - nudlive-network

  postgres:
    image: postgres:15
    container_name: nudlive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      TZ: Africa/Luanda
      PGTZ: Africa/Luanda
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 1g
    networks:
      - nudlive-network

  redis:
    image: redis:7
    container_name: nudlive-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    mem_limit: 256m
    networks:
      - nudlive-network

  kafka:
    image: apache/kafka:3.9.1
    container_name: nudlive-kafka
    restart: unless-stopped
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - nudlive-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: nudlive-livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yml
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    volumes:
      - ./livekit/livekit.yml:/etc/livekit/livekit.yml:ro
    mem_limit: 512m
    networks:
      - nudlive-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  nudlive-network:
    driver: bridge
